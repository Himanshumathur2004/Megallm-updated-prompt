      scope: runtime
      value: mongodb+srv://himanshu123:himanshu123@cluster0.ecqcp1z.mongodb.net/?appName=Cluster0
    - key: MONGODB_DB
      value: megallm_blog_platform
    - key: OPENROUTER_API_KEY
      scope: runtime
      value: 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
    - key: USE_OPENROUTER
      value: "true"
